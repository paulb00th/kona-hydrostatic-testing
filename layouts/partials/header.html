<header class="site-header">
  <div class="wrap header-inner">
    <a class="brand" href="{{ site.Home.RelPermalink }}">
      <span class="brand-name">Kona Hydrostatic Testing</span>
      <span class="brand-tag">Kailua-Kona, Hawaii</span>
    </a>

    <input type="checkbox" id="nav-toggle" class="nav-toggle" hidden>
    <label for="nav-toggle" class="nav-toggle-label" aria-label="Toggle navigation menu">
      <span></span><span></span><span></span>
    </label>

    <nav class="site-nav" aria-label="Main navigation">
      <ul>
        {{ range .Site.Menus.main }}
        {{ $active := or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }}
        {{ $url := .URL }}
        {{ with .Page }}{{ $url = .RelPermalink }}{{ end }}
        <li>
          <a href="{{ $url }}"{{ if $active }} aria-current="page"{{ end }}>{{ .Name }}</a>
        </li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
