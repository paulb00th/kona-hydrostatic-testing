{{ $p := .Site.Params }}
<footer class="site-footer">
  <div class="wrap footer-grid">
    <div class="footer-contact">
      <h2>Contact Us</h2>
      <p class="contact-row">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6.6 10.8a15.5 15.5 0 0 0 6.6 6.6l2.2-2.2a1 1 0 0 1 1-.25 11.4 11.4 0 0 0 3.6.57 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1 11.4 11.4 0 0 0 .57 3.6 1 1 0 0 1-.25 1z"/></svg>
        <a href="tel:{{ $p.phoneHref }}">{{ $p.phone }}</a>
      </p>
      <p class="contact-row">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm0 2v.4l8 5 8-5V6H4zm16 2.7-8 5-8-5V18h16V8.7z"/></svg>
        <a href="mailto:{{ $p.email }}?subject=Kona%20Hydrostatic%20Testing%20Inquiry">{{ $p.email }}</a>
      </p>
      <p class="contact-row">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z"/></svg>
        <span>{{ $p.addressLine }}, {{ $p.addressCity }}</span>
      </p>
      <p class="hours">{{ $p.hours }}</p>
    </div>

    <div class="footer-social">
      <a class="fb-link" href="{{ $p.facebook }}" rel="noopener">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M22 12a10 10 0 1 0-11.6 9.9v-7H7.9V12h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.5h-1.3c-1.2 0-1.6.8-1.6 1.6V12h2.8l-.4 2.9h-2.4v7A10 10 0 0 0 22 12z"/></svg>
        Find us on Facebook
      </a>
    </div>
  </div>

  <div class="wrap footer-bottom">
    <p>&copy; {{ now.Year }} Kona Hydrostatic Testing · DOT-authorized cylinder testing facility</p>
  </div>
</footer>
